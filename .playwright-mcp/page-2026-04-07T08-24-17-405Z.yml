            - generic [ref=e105]:
              - paragraph [ref=e106]: Чтобы сайт постоянно работал и был доступен для пользователей, его нужно где-то разместить. Обычно сайты хранят на хостингах — удалённых круглосуточных компьютерах.
              - paragraph [ref=e107]:
                - text: "Хранить сайты удалённо — удобно: не нужно следить за состоянием компьютеров, этим занимается хостинг-провайдер. С другой стороны, за такие услуги придётся платить ежемесячно. Если вы хотите"
                - link "создать сайт" [ref=e108] [cursor=pointer]:
                  - /url: https://www.unisender.com/ru/blog/sozdat-sayt/
                - text: ", но не уверены, что в будущем он вам понадобится, — попробуйте разместить сайт на бесплатном хостинге."
              - paragraph [ref=e109]: Я собрал 8 бесплатных сервисов и рассказываю, какие у них ограничения, возможности, и для каких проектов такие хостинги подойдут.
            - generic [ref=e111]:
              - generic [ref=e112]:
                - generic [ref=e113]:
                  - generic [ref=e114]:
                    - generic "Информация о рекламодателе" [ref=e115]: "Реклама. ООО «Юнисендер СМАРТ», ИНН 9731091240, erid: 2VSb5yCvZRT"
                    - button "Юридическая информация о рекламе" [ref=e116] [cursor=pointer]:
                      - generic [ref=e117]: Реклама
                      - img [ref=e118]
                  - generic [ref=e121]: Генерируйте письма с ИИ
                  - paragraph [ref=e123]: Больше не надо тратить время на дизайн и тексты писем. ИИ‑ассистент всё сделает сам.
                  - link "Попробовать" [ref=e124] [cursor=pointer]:
                    - /url: https://app.unisender.com/ru/v5/spa/registration/step/1?plc=blog&object=banner&offer=registration&type=rotate&name=email_s_ii&erid=2VSb5yCvZRT
                - img "Генерируйте письма с ИИ" [ref=e126]
              - heading "Минусы бесплатного хостинга" [level=2] [ref=e127]
              - paragraph [ref=e128]: Работают за счёт рекламы. Если хостинг платный, то компания зарабатывает с аренды серверов. В бесплатных за аренду не платят, поэтому некоторые провайдеры зарабатывают размещением рекламы. Рекламы может быть много, в каждом углу сайта. Это отталкивает пользователей и формирует у них негативный опыт по отношению к ресурсу. Да и кто знает, какую рекламу увидит человек?
              - paragraph [ref=e129]:
                - text: Работают на доменах третьего уровня.
                - link "Домен" [ref=e130] [cursor=pointer]:
                  - /url: https://www.unisender.com/ru/glossary/chto-takoe-domen/
                - text: — это имя сайта. Если вы делаете серьёзный проект — придётся покупать домен отдельно. Он будет называться доменом второго уровня. Например, unisender.com.
              - paragraph [ref=e131]: "Домен третьего уровня выглядит так: blog.site.ru. Они хуже индексируются поисковыми системами и хуже запоминаются пользователям. Бесплатные хостинги обычно на них и работают."
              - paragraph [ref=e132]: Работают медленнее. Вычислительные мощности бесплатных серверов хуже, поэтому запросы пользователей обрабатываются дольше. А при больших нагрузках серверы могут упасть, и пользователи не попадут на ресурс.
              - paragraph [ref=e133]: "Работают с маленькими сайтами. Для больших корпоративных ресурсов или онлайн-магазинов услуги бесплатных хостингов не подойдут — не хватит места для хранения файлов. Вот в чём дело: обычно провайдеры дают около 500 МБ – 2 ГБ дискового пространства. Для маленького ресурса этого достаточно, а вот для большого, с множеством картинок и видео, места не хватит."
              - paragraph [ref=e134]: Работают без технической поддержки. Если сайт сломается или пропадёт с сервера — компания ничем не поможет.
            - generic [ref=e138]:
